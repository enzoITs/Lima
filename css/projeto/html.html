<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Geométrica</title>

    <link rel="stylesheet" href="/css/projeto/style.css">
</head>

<body>

    <div class="display">
        <h1>Soma</h1>

        <input type="number" id="soma1" placeholder="Número 1">
        <input type="number" id="soma2" placeholder="Número 2">

        <button onclick="somar()">Somar</button>

        <h2 id="resultSoma"></h2>
    </div>


    <div class="display">
        <h1>Subtração</h1>

        <input type="number" id="sub1" placeholder="Número 1">
        <input type="number" id="sub2" placeholder="Número 2">

        <button onclick="subtrair()">Subtrair</button>

        <h2 id="resultSub"></h2>
    </div>


    <div class="display">
        <h1>Multiplicação</h1>

        <input type="number" id="mult1" placeholder="Número 1">
        <input type="number" id="mult2" placeholder="Número 2">

        <button onclick="multiplicar()">Multiplicar</button>

        <h2 id="resultMult"></h2>
    </div>


    <div class="display">
        <h1>Área do Triângulo</h1>

        <input type="number" id="triBase" placeholder="Base">
        <input type="number" id="triAltura" placeholder="Altura">

        <button onclick="areaTriangulo()">Calcular</button>

        <h2 id="resultTri"></h2>
    </div>
    
    
    <div class="display">
        <h1>Área do Quadrado</h1>

        <input type="number" id="lado" placeholder="Lado">


        <button onclick="areaQuadrado()">Calcular</button>

        <h2 id="resultadoQuadrado"></h2>
    </div>


    <div class="display">
        <h1>Área do Trapézio</h1>

        <input type="number" id="trapBaseMaior" placeholder="Base maior">
        <input type="number" id="trapBaseMenor" placeholder="Base menor">
        <input type="number" id="trapAltura" placeholder="Altura">

        <button onclick="areaTrapezio()">Calcular</button>

        <h2 id="resultTrap"></h2>
    </div>


    <div class="display">
        <h1>Área do Círculo</h1>

        <input type="number" id="circulo" placeholder="Raio">

        <button onclick="areaCirculo()">Calcular</button>

        <h2 id="resultadoCirculo"></h2>
    </div>


    <div class="display">
        <h1>Área do Losango</h1>

        <input type="number" id="diagMaior" placeholder="Diagonal maior">
        <input type="number" id="diagMenor" placeholder="Diagonal menor">

        <button onclick="areaLosango()">Calcular</button>

        <h2 id="resultLosango"></h2>
    </div>
    
    
    <div class="display">
        <h1>Área do Setor Circular</h1>

        <input type="number" id="1" placeholder="Angulo">
        <input type="number" id="2" placeholder="Raio">

        <button onclick="areaSetorCircular()">Calcular</button>

        <h2 id="resultadoSetor"></h2>
    </div>
    
    
    <div class="display">
        <h1>Área do Coroa Circular</h1>

        <input type="number" id="3" placeholder="Raio maior">
        <input type="number" id="4" placeholder="Raio menor">

        <button onclick="areaCoroaCircular()">Calcular</button>

        <h2 id="resultadoCoroa"></h2>
    </div>
    
    
    <div class="display">
        <h1>Área da Elipse</h1>

        <input type="number" id="5" placeholder="Semieixo maior">
        <input type="number" id="6" placeholder="Semieixo menor">

        <button onclick="areaElipse()">Calcular</button>

        <h2 id="resultadoElipse"></h2>
    </div>
    
    
    <div class="display">
        <h1>Área do Paralelogramo</h1>

        <input type="number" id="7" placeholder="Base">
        <input type="number" id="8" placeholder="Altura">

        <button onclick="areaParalelogramo()">Calcular</button>

        <h2 id="resultadoParalelogramo"></h2>
    </div>
    
    
    <div class="display">
        <h1>Área da Poligono Regular</h1>

        <input type="number" id="9" placeholder="Base">
        <input type="number" id="10" placeholder="Altura">

        <button onclick="areaPoligonoRegular()">Calcular</button>

        <h2 id="resultadoPoligono"></h2>
    </div>

    <script src="/css/projeto/script.js"></script>

</body>
</html>
